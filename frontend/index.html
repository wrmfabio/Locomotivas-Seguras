<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>🚆 Dashboard - Locomotivas Seguras</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Locomotivas Inspecionadas</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>Locomotivas</li>
      <li>Análises</li>
      <li>Relatórios</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <h1>Dados para Análises/h1>
      <input type="text" id="search" placeholder="Buscar vídeo..." />
    </header>

    <!-- STATS -->
    <section class="stats">
      <div class="card">🚆 <span id="totalVideos">0</span><p>Vídeos</p></div>
      <div class="card">⚠️ 12<p>Alertas</p></div>
      <div class="card">📊 93%<p>Precisão IA</p></div>
    </section>

    <!-- VIDEO GRID -->
    <section id="videoList" class="grid"></section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
